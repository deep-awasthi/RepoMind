spring:
  application:
    name: repomind
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/repomind}
    username: ${SPRING_DATASOURCE_USERNAME:repomind}
    password: ${SPRING_DATASOURCE_PASSWORD:repomindpassword}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  neo4j:
    uri: ${SPRING_NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${SPRING_NEO4J_AUTHENTICATION_USERNAME:neo4j}
      password: ${SPRING_NEO4J_AUTHENTICATION_PASSWORD:repomindpassword}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

repomind:
  clone-dir: ${REPOMIND_CLONE_DIR:backend/clones}

logging:
  level:
    root: INFO
    com.repomind: DEBUG
    org.springframework.data.neo4j: INFO
